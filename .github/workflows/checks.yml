name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify the lockfile is up to date
        run: uv lock --check

      - name: Install the locked environment
        run: uv sync --locked

      - name: Prepare local data
        run: uv run python scripts/fetch_data.py

      - name: Reject pip/conda instructions
        run: uv run python scripts/check_no_pip.py

      - name: Validate notebooks
        run: uv run python scripts/check_notebooks.py

      - name: Lint
        run: uv run ruff check .
